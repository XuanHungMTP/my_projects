<html lang="vi">
<head>

    <link rel="stylesheet" href="w3.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .mySlides {
            display: none;
        }
        .slide-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }
        .w3-bar a {
            font-weight: bold;
        }
    </style>
</head>

<body>
<div>
    <img src="IMG/bannerdulich.jpg" style="width:100%; height:250px; object-fit:cover;">
</div>

<div class="w3-bar w3-teal w3-large">
    <a href="trangchu.html" class="w3-bar-item w3-button w3-hover-yellow">Trang Chủ</a>
    <a href="vemaybay.html" class="w3-bar-item w3-button w3-hover-yellow">Vé Máy Bay</a>
    <a href="khachsan.html" class="w3-bar-item w3-button w3-hover-yellow">Khách Sạn</a>
    <a href="thuexe.html" class="w3-bar-item w3-button w3-hover-yellow">Thuê Xe</a>
    <a href="tintuc.html" class="w3-bar-item w3-button w3-hover-yellow">Tin Tức</a>
    <a href="#" class="w3-bar-item w3-button w3-yellow w3-right">Đặt Tour</a>
</div>

<div class="w3-content w3-display-container" style="max-width:1400px">
    <div class="mySlides">
        <img src="IMG/slide1.png" class="w3-image slide-img">
        <div class="w3-display-middle w3-text-white w3-center">
        </div>
    </div>
    <div class="mySlides">
        <img src="IMG/slide2.jpg" class="w3-image slide-img">
        <div class="w3-display-middle w3-text-white w3-center">
        </div>
    </div>

    <div class="mySlides">
        <img src="IMG/slide3.jpg" class="w3-image slide-img">
        <div class="w3-display-middle w3-text-white w3-center">
        </div>
    </div>

    <button class="w3-button w3-display-left w3-black" onclick="plusDivs(-1)">&#10094;</button>
    <button class="w3-button w3-display-right w3-black" onclick="plusDivs(1)">&#10095;</button>

</div>

<div class="w3-container w3-padding-32 w3-center">
    <h2>Chào Mừng Đến Với Du Lịch Việt</h2>
    <p>Chúng tôi mang đến cho bạn những hành trình tuyệt vời, giá cả hợp lý và dịch vụ chuyên nghiệp.</p>
</div>

<footer class="w3-container w3-teal w3-center w3-padding-16">
    <p>© 2026 Du Lịch Việt | Thiết kế bởi Đồng Xuân Hùng</p>
</footer>

<script>
var slideIndex = 1;
showDivs(slideIndex);

function plusDivs(n) {
    showDivs(slideIndex += n);
}

function showDivs(n) {
    var i;
    var x = document.getElementsByClassName("mySlides");
    if (n > x.length) {slideIndex = 1}
    if (n < 1) {slideIndex = x.length}
    for (i = 0; i < x.length; i++) {
        x[i].style.display = "none";
    }
    x[slideIndex-1].style.display = "block";
}

setInterval(function() {
    plusDivs(1);
}, 3000);
</script>

</body>
</html>
